<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ToolShare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <header class="navbar">
        <div class="logo">ToolShare</div>
        <nav>
            <a href="first.html">Home</a>
            <a href="login.html" class="nav-btn login-btn">Login</a>
            <a href="register.html" class="nav-btn register-btn">Register</a>
        </nav>
    </header>

    <div class="form-wrapper">
        <div class="form-container">
            <h2>Create Account</h2>

            <form id="registerForm" onsubmit="registerUser(event)">
                <input type="text" id="regName" placeholder="Full Name" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <input type="text" id="regLocation" placeholder="Enter Pincode / Location" required>

                <select id="regRole" required>
                    <option value="">Select Role</option>
                    <option value="owner">Tool Owner</option>
                    <option value="borrower">Borrower</option>
                </select>

                <button type="submit">Register</button>
            </form>

            <p class="form-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
