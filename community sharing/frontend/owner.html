<!DOCTYPE html>
<html>
<head>
    <title>Owner Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">ToolShare</div>
    <nav>
        <a href="first.html">Home</a>
        <a href="owner.html">Owner</a>
        <a href="#" onclick="logoutUser()">Logout</a>
    </nav>
</header>

<div class="owner-container">
    <h2>Tool Requests</h2>
    <table>
        <thead>
            <tr>
                <th>Tool</th>
                <th>Duration</th>
                <th>Pickup</th>
                <th>Return</th>
                <th>Borrower</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="requestTable"></tbody>
    </table>
</div>

<div class="owner-container">
    <h2>Selected Request</h2>
    <p id="selectedRequestText">Select a request row first.</p>
</div>

<div class="owner-container">
    <h2>Request Details</h2>
    <div id="requestDetailsBox" class="payment-box"></div>
</div>

<div class="owner-container">
    <h2>Chat</h2>
    <div id="chatBox" class="chat-box"></div>
    <input type="text" id="chatInput" placeholder="Type message">
    <button onclick="sendChatMessage()">Send</button>
</div>

<div class="owner-container">
    <h2>Upload Verification Video</h2>
    <input type="file" id="verificationVideo" accept="video/*">
    <button onclick="uploadVerification()">Upload Video</button>
</div>

<div class="owner-container">
    <h2>Payment Setup</h2>
    <input type="number" id="ownerRentAmount" placeholder="Rent Amount">
    <input type="number" id="ownerDepositAmount" placeholder="Security Deposit">
    <input type="text" id="ownerUpiId" placeholder="Owner UPI ID">
    <textarea id="ownerNote" placeholder="Optional payment note"></textarea>
    <button onclick="createPaymentSetup()">Create Payment Setup</button>
    <div id="paymentInfo" class="payment-box"></div>
</div>

<div class="owner-container">
    <h2 id="reviewSectionTitle">Borrower Feedback & Ratings</h2>

    <select id="reviewRating">
        <option value="">Select Rating</option>
        <option value="5">5 - Excellent</option>
        <option value="4">4 - Very Good</option>
        <option value="3">3 - Good</option>
        <option value="2">2 - Fair</option>
        <option value="1">1 - Poor</option>
    </select>

    <textarea id="reviewComment" placeholder="Write your feedback about the borrower"></textarea>
    <button id="reviewSubmitBtn" onclick="submitReview()">Submit Review</button>

    <div id="reviewsBox" class="payment-box"></div>
</div>

<footer>
    <p style="text-align:left;">© 2026 ToolShare</p>
</footer>


<script src="script.js"></script>
</body>
</html>
